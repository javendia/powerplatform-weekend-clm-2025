name: fabric-deployment

# Controls when the workflow will run
on:
  # Triggers the workflow on push events but only for the "main" branch
  push:
    branches: [ "main" ]

  # Allows to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read  # This is required for actions/checkout

# Setting environment variables
env:
  FAB_CAPACITY: ${{ secrets.FAB_CAPACITY }}
  WORKSPACE_NAME: ${{ vars.WORKSPACE_NAME }}
  FAB_ADMIN_UPNS: ${{ secrets.FAB_ADMIN_UPNS }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip' # caching pip dependencies

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ./src/requirements.txt

      - name: Log in to Fabric CLI
        run: |
          fab config set fab_encryption_fallback_enabled true
          FED_TOKEN=$(curl -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=api://AzureADTokenExchange" | jq -r '.value')
          fab auth login -t ${{ secrets.AZURE_TENANT_ID }} -u ${{ secrets.AZURE_CLIENT_ID }} --federated-token $FED_TOKEN

      - name: Run installation script
        run: |
          python scripts/install.py

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # SP requires:
      #  - Contributor permissions over Fabric capacity
      #  - User permissions over the connections to data sources
      - name: Deploy items
        run: |
          python ./scripts/publish.py --WorkspaceId ${{ env.CONTROL_WORKSPACE_ID }} --Environment PRO --RepositoryDirectory ./src
